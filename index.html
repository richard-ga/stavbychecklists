<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; line-height: 1.6; color: #333; }
        .item { display: flex; align-items: center; margin-bottom: 8px; cursor: pointer; }
        input[type="checkbox"] { margin-right: 10px; transform: scale(1.2); }
        .done { text-decoration: line-through; color: gray; }
    </style>
</head>
<body>
    <h3>Nazov</h3>
    <div id="checklist">
        <label class="item"><input type="checkbox"> AA</label>
        <label class="item"><input type="checkbox"> AB</label>
        <label class="item"><input type="checkbox"> AC</label>
    </div>

    <script>
        // Malý skript, ktorý prečiarkne text po kliknutí
        document.querySelectorAll('input').forEach(checkbox => {
            checkbox.addEventListener('change', function() {
                this.parentElement.classList.toggle('done', this.checked);
            });
        });
    </script>
</body>
</html>
