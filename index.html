<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interaktívny Recept</title>
    <style>
        /* Nastavenie pre celé telo stránky */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; /* Použijeme Notion fonty */
            line-height: 1.6; 
            background-color: #000000; /* Čierne pozadie */
            color: #FFFFFF; /* Biely text */
            padding: 20px;
            margin: 0;
        }

        /* Štýl pre nadpis */
        h3 {
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        /* Štýl pre jednu položku zoznamu */
        .item { 
            display: flex; 
            align-items: center; 
            margin-bottom: 12px; 
            cursor: pointer; 
            padding: 5px;
            border-radius: 5px;
            transition: background-color 0.2s;
        }

        /* Efekt pri prejdení myšou (pre lepšiu interaktivitu) */
        .item:hover {
            background-color: #222;
        }

        /* Štýl pre samotný checkbox */
        input[type="checkbox"] { 
            margin-right: 12px; 
            transform: scale(1.3); 
            cursor: pointer;
            /* Trochu vlastného štýlu pre checkbox */
            accent-color: #007bff; /* Farba zaškrtnutia (napr. modrá) */
        }

        /* Štýl pre hotovú (odškrtnutú) položku */
        .done { 
            text-decoration: line-through; 
            color: #888; /* Šedý text */
        }
    </style>
</head>
<body>

    <h3>Ingrediencie</h3>
    
    <div id="checklist">
        <label class="item"><input type="checkbox"> A</label>
        <label class="item"><input type="checkbox"> AB</label>
        <label class="item"><input type="checkbox"> ABC</label>
        <label class="item"><input type="checkbox"> ABCD</label>
        <label class="item"><input type="checkbox"> ABCDE</label>
    </div>

    <script>
        // Skript, ktorý pridáva triedu 'done' po zaškrtnutí
        document.querySelectorAll('input').forEach(checkbox => {
            // Pridať event listener pre zmenu stavu
            checkbox.addEventListener('change', function() {
                if (this.checked) {
                    this.parentElement.classList.add('done');
                } else {
                    this.parentElement.classList.remove('done');
                }
            });
        });
    </script>

</body>
</html>
